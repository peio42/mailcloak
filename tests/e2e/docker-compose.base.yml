services:
  mailcloak:
    build:
      context: ../..
      dockerfile: tests/e2e/mailcloak/Dockerfile
    command: ["/config/mailcloak.yaml"]
    volumes:
      - mailcloak-state:/var/lib/mailcloak
      - postfix-private:/var/spool/postfix/private
      - ./scripts:/scripts:ro
    healthcheck:
      test: ["CMD", "test", "-S", "/var/spool/postfix/private/mailcloak-policy"]
      interval: 3s
      timeout: 2s
      retries: 40

  dovecot:
    build:
      context: ./dovecot
      dockerfile: Dockerfile
    volumes:
      - mailcloak-state:/var/lib/mailcloak
      - postfix-private:/var/spool/postfix/private
    depends_on:
      mailcloak:
        condition: service_healthy

  postfix:
    build:
      context: ./postfix
      dockerfile: Dockerfile
    volumes:
      - mailcloak-state:/var/spool/postfix/mailcloak
      - postfix-private:/var/spool/postfix/private
      - ./scripts:/scripts:ro
    ports:
      - "1025:25"
    depends_on:
      mailcloak:
        condition: service_healthy
      dovecot:
        condition: service_started

  postfix-external:
    build:
      context: ./postfix
      dockerfile: Dockerfile
    volumes:
      - ./scripts:/scripts:ro
    environment:
      POSTFIX_EXTERNAL: "1"
    depends_on:
      mailcloak:
        condition: service_healthy

volumes:
  mailcloak-state:
  postfix-private:
