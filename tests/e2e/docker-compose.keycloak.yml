services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      JAVA_OPTS_APPEND: "-Xms256m -Xmx768m"
    volumes:
      - ./providers/keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8080:8080"
    mem_limit: 1g

  mailcloak:
    volumes:
      - ./providers/keycloak/mailcloak.yaml:/config/mailcloak.yaml:ro
    depends_on:
      keycloak:
        condition: service_started

  dovecot:
    volumes:
      - ./providers/keycloak/dovecot.conf:/etc/dovecot/dovecot.conf:ro
